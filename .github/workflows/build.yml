name: Build & Release APK

on:
  push:
    branches: ['*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      # Cloud-service credentials — injected for BOTH debug & release builds so
      # every CI-built APK can upload images (R2) and sync data (D1). Without
      # these, BuildConfig.R2_*/D1_* ship empty and cloud calls fail with 401.
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      D1_ACCOUNT_ID: ${{ secrets.D1_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      D1_API_TOKEN: ${{ secrets.D1_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Build unsigned (debug) APK ──
      - name: Build debug APK
        env:
          SILICON_FLOW_API_KEY: ${{ secrets.SILICON_FLOW_API_KEY }}
        run: ./gradlew assembleDebug

      - name: Upload unsigned APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: thingspath-unsigned
          path: app/build/outputs/apk/debug/thingspath-unsigned.apk

      # ── Build signed (release) APK ──
      - name: Decode keystore
        if: env.HAS_KEYSTORE != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/keystore.jks

      - name: Build release APK
        if: env.HAS_KEYSTORE != ''
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SILICON_FLOW_API_KEY: ${{ secrets.SILICON_FLOW_API_KEY }}
        run: ./gradlew assembleRelease

      - name: Upload signed APK artifact
        if: env.HAS_KEYSTORE != ''
        uses: actions/upload-artifact@v7
        with:
          name: thingspath-signed
          path: app/build/outputs/apk/release/thingspath-signed.apk

      # ── Create GitHub Release ──
      - name: Get version name
        id: version
        run: |
          # Robust extraction for KTS: find 'versionName' and extract value between quotes
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | awk -F'"' '{print $2}')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        id: assets
        run: |
          # Use find to locate the specific APKs we renamed
          FILES=$(find app/build/outputs/apk -name "thingspath-*.apk" | xargs echo | sed 's/ /,/g')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: ThingsPath v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          artifacts: ${{ steps.assets.outputs.files }}
          body: |
            ## ThingsPath v${{ steps.version.outputs.version }}

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Downloads
            - 📦 `thingspath-unsigned.apk` — Debug build (未签名)
            - 🔐 `thingspath-signed.apk` — Release build (已签名)
          makeLatest: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
