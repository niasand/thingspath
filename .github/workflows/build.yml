name: Build & Release APK

on:
  push:
    branches: ['*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Build unsigned (debug) APK ──
      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload unsigned APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingspath-unsigned
          path: app/build/outputs/apk/debug/thingspath-unsigned.apk

      # ── Build signed (release) APK ──
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/keystore.jks

      - name: Build release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload signed APK artifact
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: thingspath-signed
          path: app/build/outputs/apk/release/thingspath-signed.apk

      # ── Create GitHub Release ──
      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        id: assets
        run: |
          ASSETS=""
          if [ -f "app/build/outputs/apk/debug/thingspath-unsigned.apk" ]; then
            ASSETS="app/build/outputs/apk/debug/thingspath-unsigned.apk"
          fi
          if [ -f "app/build/outputs/apk/release/thingspath-signed.apk" ]; then
            if [ -n "$ASSETS" ]; then
              ASSETS="$ASSETS,app/build/outputs/apk/release/thingspath-signed.apk"
            else
              ASSETS="app/build/outputs/apk/release/thingspath-signed.apk"
            fi
          fi
          echo "files=$ASSETS" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: ThingsPath v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          artifacts: ${{ steps.assets.outputs.files }}
          body: |
            ## ThingsPath v${{ steps.version.outputs.version }}

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### Downloads
            - 📦 `thingspath-unsigned.apk` — Debug build (未签名)
            - 🔐 `thingspath-signed.apk` — Release build (已签名)
          makeLatest: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
